name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure Supabase credentials
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        # Only inject the anon key (safe for frontend) — never secrets
        if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
          echo "Configuring Supabase credentials for frontend..."
          cat > docs/config.js << 'CONFIGEOF'
        window.APP_CONFIG = {
            SUPABASE_URL: '$SUPABASE_URL',
            SUPABASE_ANON_KEY: '$SUPABASE_ANON_KEY',
            ENABLE_SUPABASE: true,
            FALLBACK_TO_GEOJSON: true,
            MAP_CENTER: [49.251, -123.060],
            MAP_ZOOM: 11,
            GEOJSON_PATH: 'data/fountains_processed.geojson',
            VERSION: '2.0.0',
            DEPLOYMENT_TYPE: 'github-pages'
        };
        CONFIGEOF
          # Replace placeholder values with actual env vars
          sed -i "s|\$SUPABASE_URL|$SUPABASE_URL|g" docs/config.js
          sed -i "s|\$SUPABASE_ANON_KEY|$SUPABASE_ANON_KEY|g" docs/config.js
        else
          echo "No Supabase credentials — using default config (static data only)"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
