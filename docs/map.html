<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YVR Water Fountains Map - Find & Rate Drinking Fountains in Vancouver & Burnaby</title>
  <meta name="description" content="Interactive map of 429+ water fountains across Vancouver and Burnaby. Find nearby drinking fountains, read community ratings, and discover pet-friendly options.">
  <meta name="keywords" content="water fountains, Vancouver, Burnaby, drinking water, public fountains, hydration stations">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/logo.png">
  
  <!-- Social media meta tags -->
  <meta property="og:title" content="YVR Water Fountains Map">
  <meta property="og:description" content="Find and rate drinking fountains across Vancouver and Burnaby">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yvr-water-fountains.netlify.app/map.html">
  
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="YVR Water Fountains Map">
  <meta name="twitter:description" content="Find and rate drinking fountains across Vancouver and Burnaby">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/theme.css">
  <style>
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--color-dark);
}

/* ── Header ── */
.header {
  background: var(--color-primary);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.header-logo {
  width: 100px;
  height: auto;
  border-radius: 16px;
}

.header h1 {
  margin: 0;
  line-height: 0;
}

.header-title-img {
  height: 130px;
  max-width: 100%;
  width: auto;
  display: block;
  object-fit: contain;
}

.header .tagline {
  font-family: var(--font-subtitle);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-dark);
  opacity: 0.7;
  letter-spacing: 0.03em;
}

.nav-links {
  display: flex;
  gap: 1.2rem;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
  width: 100%;
}

.nav-link {
  color: var(--color-secondary);
  font-family: 'Courier New', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  text-decoration: none;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  border-bottom: 2px dotted var(--color-secondary);
  padding-bottom: 1px;
  transition: all 0.2s;
}

.nav-link:hover {
  color: var(--color-dark);
  border-bottom-style: solid;
}

/* ── Map ── */
#map {
  height: calc(100vh - 120px);
}

/* ── Tile filter (preview — remove after choosing) ── */
.leaflet-tile-pane {
  filter: saturate(0.6) brightness(1.08);
}


/* ── Leaflet popup override ── */
.leaflet-popup-content-wrapper {
  border-radius: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  padding: 0;
}

.leaflet-popup-content {
  margin: 0;
  font-family: var(--font-body);
}

/* ── Popup card ── */
.popup-content {
  max-width: 300px;
  padding: 16px;
  border-top: 4px solid var(--color-tertiary);
}

.popup-content.reviewed {
  border-top-color: var(--color-primary);
}

.popup-content.community-reviewed {
  border-top-color: var(--color-secondary);
}

.popup-title {
  font-family: var(--font-heading);
  font-size: 1.05rem;
  margin-bottom: 0.6rem;
}

.popup-title-link {
  color: var(--color-dark);
  text-decoration: none;
}

.popup-title-link:hover {
  color: var(--color-secondary);
}

.popup-info {
  display: flex;
  justify-content: space-between;
  padding: 0.3rem 0;
  font-size: 0.82rem;
  border-bottom: 1px solid #f0edf5;
}

.popup-info:last-of-type {
  border-bottom: none;
}

.popup-label {
  color: #888;
  font-weight: 500;
}

.popup-value {
  color: var(--color-dark);
  font-weight: 600;
}

.popup-clickable {
  color: var(--color-secondary);
  cursor: pointer;
  text-decoration: none;
}

.popup-clickable:hover {
  text-decoration: underline;
}

/* ── Bottom sheet ── */
.bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  transform: translateY(100%);
  transition: transform 0.3s ease-out;
  z-index: 2000;
  max-height: 80vh;
  overflow-y: auto;
  overflow-x: hidden;
}

.bottom-sheet.active {
  transform: translateY(0);
}

.sheet-color-bar {
  height: 4px;
  background: var(--color-tertiary);
}

.sheet-color-bar.reviewed {
  background: var(--color-primary);
}

.sheet-color-bar.community-reviewed {
  background: var(--color-secondary);
}

.bottom-sheet-handle {
  width: 40px;
  height: 4px;
  background: #ddd;
  border-radius: 2px;
  margin: 12px auto;
}

.bottom-sheet-content {
  padding: 0 20px 20px;
}

.sheet-header {
  display: flex;
  gap: 12px;
  margin-bottom: 1rem;
}

.sheet-photo {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}

.sheet-header-text {
  flex: 1;
  min-width: 0;
}

.bottom-sheet-title {
  font-family: var(--font-heading);
  font-size: 1.1rem;
  color: var(--color-dark);
  margin-bottom: 0.2rem;
}

.sheet-subtitle {
  font-size: 0.8rem;
  color: #888;
}

.sheet-details {
  background: var(--color-info-bg);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  border-left: 3px solid var(--color-accent);
}

.sheet-row {
  display: flex;
  justify-content: space-between;
  padding: 0.3rem 0;
  font-size: 0.85rem;
  border-bottom: 1px solid #f0edf5;
}

.sheet-row:last-child {
  border-bottom: none;
}

.bottom-sheet-label {
  color: #888;
  font-weight: 500;
}

.bottom-sheet-value {
  color: var(--color-dark);
  font-weight: 600;
}

.sheet-caption {
  font-size: 0.8rem;
  color: #555;
  font-style: italic;
  line-height: 1.4;
  padding: 10px 12px;
  background: var(--color-light);
  border-radius: 8px;
  margin-bottom: 12px;
  max-height: 100px;
  overflow-y: auto;
}

.sheet-actions {
  display: flex;
  gap: 8px;
}

.sheet-action-btn {
  flex: 1;
  text-align: center;
  padding: 0.5rem;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
}

.sheet-action-btn.primary {
  background: var(--color-secondary);
  color: #fff;
}

.sheet-action-btn.secondary {
  background: var(--color-light);
  color: var(--color-dark);
}

.bottom-sheet-close {
  position: absolute;
  top: 10px;
  right: 16px;
  background: none;
  border: none;
  font-size: 1.5rem;
  color: #999;
  cursor: pointer;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1999;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease-out;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ── Footer ── */
.footer {
  background: var(--color-dark);
  color: var(--color-accent);
  padding: 1rem 1.5rem;
  text-align: center;
  font-size: 0.85rem;
}

.footer a {
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 600;
}

.footer a:hover {
  color: var(--color-secondary);
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}

.footer-divider {
  border: none;
  border-top: 1px solid rgba(197,163,255,0.2);
  margin: 0.5rem 0;
}

.footer-credit {
  font-size: 0.75rem;
  color: rgba(197,163,255,0.6);
}

.footer .admin-link {
  color: rgba(197,163,255,0.4);
  font-weight: 400;
}

/* ── Mobile: hide popups, show bottom sheet ── */
@media (max-width: 768px) {
  .header-title-img { height: 65px; }
  .header-logo { width: 50px; }
  .nav-links { justify-content: center; margin-left: 0; }
  .nav-link { font-size: 0.7rem; }
  #map { height: calc(100vh - 100px); }
  .leaflet-popup { display: none !important; }
  .bottom-sheet { max-height: 85vh; }
  .bottom-sheet-content { padding: 0 15px 15px; }
  .sheet-photo { width: 60px; height: 60px; }
  .footer { padding: 0.75rem 1rem; }
  .footer-links { gap: 1rem; }
}

@media (max-width: 480px) {
  .header { padding: 0.5rem 0.75rem; }
  .header-title-img { height: 50px; }
  .nav-link { font-size: 0.6rem; }
  #map { height: calc(100vh - 90px); }
}

@media (min-width: 1200px) {
  .header { padding: 0.75rem 2rem; }
  .popup-content { max-width: 340px; }
}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="images/logo.png" alt="YVR Water Fountains" class="header-logo">
      <div>
        <h1><img src="images/header.png" alt="YVR Water Fountains" class="header-title-img"></h1>

      </div>
    </div>
    <div class="nav-links">
      <a href="public_review_form.html" class="nav-link">Submit Review</a>
      <a href="#" id="locate-me" class="nav-link">My Location</a>
      <a href="https://www.instagram.com/yvrwaterfountains/" target="_blank" class="nav-link">@yvrwaterfountains</a>
    </div>
  </div>
  

  
  <div id="map"></div>
  
  <div class="footer">
    <div class="footer-links">
      <a href="https://www.instagram.com/yvrwaterfountains/" target="_blank">@yvrwaterfountains</a>
      <a href="public_review_form.html">Submit a Review</a>
      <a href="https://github.com/kcarbeck/yvr-water-fountains" target="_blank">GitHub</a>
      <a href="#" id="admin-access" class="admin-link">Admin</a>
    </div>
    <hr class="footer-divider">
    <div class="footer-credit">
      Community-maintained fountain ratings across Vancouver &amp; Burnaby
      <br>Built by <a href="https://github.com/kcarbeck" target="_blank">kcarbeck</a>
    </div>
  </div>
  
  <div class="overlay" id="overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-color-bar" id="sheet-color-bar"></div>
    <div class="bottom-sheet-handle"></div>
    <button class="bottom-sheet-close" id="bottom-sheet-close">&times;</button>
    <div class="bottom-sheet-content" id="bottom-sheet-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.min.js"></script>
  <script src="env.local.js" onerror="/* no local env */"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/fountain-data.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
