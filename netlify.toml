[build]
  # No build step needed — the map reads live from Supabase.
  # Netlify just serves the static HTML/JS/CSS from docs/.
  command = "echo 'No build step required'"
  publish = "docs"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# API redirects for Netlify functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/submit-review"
  to = "/.netlify/functions/submit-review"
  status = 200

# Weekly reminder email — Mondays 10am Pacific (6pm UTC)
[functions."weekly-reminder"]
  schedule = "0 18 * * 1"
